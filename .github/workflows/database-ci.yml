# Pipeline CI Database — SQLite Schema + PostgreSQL Migration + Consistency Check
#
# Documentazione:
# Eseguita su push a proto/Renan e su PR verso main/proto quando cambiano
# local_database.gd o supabase_migration.sql.
# Tre job:
#   1. sqlite-validate  — estrae CREATE TABLE da local_database.gd, testa con sqlite3
#   2. postgres-validate — adatta supabase_migration.sql, testa su PostgreSQL 15
#   3. schema-consistency — confronta i due schemi (warning: non blocca la pipeline)
#
# NOTA: schema-consistency usa continue-on-error: true perché il gioco è in
# sviluppo attivo e i due schemi possono temporaneamente divergere.

name: database-ci
run-name: "${{ github.head_ref || github.ref_name }} — Database CI"

on:
  pull_request:
    branches: [main, proto]
    paths:
      - "v1/scripts/autoload/local_database.gd"
      - "v1/data/supabase_migration.sql"
  push:
    branches: [proto, Renan]
    paths:
      - "v1/scripts/autoload/local_database.gd"
      - "v1/data/supabase_migration.sql"
  workflow_dispatch:

concurrency:
  group: database-ci-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Valida lo schema SQLite definito in local_database.gd
  # Estrae i CREATE TABLE via parsing GDScript, li esegue su sqlite3 in-memory,
  # verifica le 7 tabelle attese e fa CRUD basico su accounts.
  # Esporta sqlite-schema.json per il job di consistency.
  # ──────────────────────────────────────────────────────────────────────────
  sqlite-validate:
    name: "SQLite — Schema & CRUD"
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate SQLite schema and CRUD
        shell: python
        run: |
          import sqlite3, re, json, sys

          GDSOURCE = "v1/scripts/autoload/local_database.gd"

          # Tabelle attese. Aggiorna questa lista quando aggiungi nuove tabelle al gioco.
          EXPECTED_TABLES = {
              "accounts", "colore", "categoria", "shop",
              "items", "inventario", "characters",
          }

          with open(GDSOURCE) as f:
              content = f.read()

          def extract_create_table_sqls(src):
              """Estrae SQL dalle chiamate _execute(...) in GDScript."""
              results = []
              i = 0
              while True:
                  pos = src.find("_execute(", i)
                  if pos == -1:
                      break
                  start = pos + len("_execute(")
                  depth, j = 1, start
                  while j < len(src) and depth > 0:
                      if src[j] == "(":
                          depth += 1
                      elif src[j] == ")":
                          depth -= 1
                      j += 1
                  call_body = src[start : j - 1]
                  sql = "".join(re.findall(r'"([^"]*)"', call_body))
                  if "CREATE TABLE" in sql.upper():
                      results.append(sql.strip())
                  i = pos + 1
              return results

          sqls = extract_create_table_sqls(content)
          print(f"CREATE TABLE trovati: {len(sqls)}\n")

          conn = sqlite3.connect(":memory:")
          conn.execute("PRAGMA foreign_keys = ON;")
          conn.execute("PRAGMA journal_mode = WAL;")

          errors = []

          # Esegui ogni CREATE TABLE
          for sql in sqls:
              match = re.search(r"CREATE TABLE IF NOT EXISTS (\w+)", sql, re.I)
              label = match.group(1) if match else "unknown"
              try:
                  conn.execute(sql)
                  print(f"  OK  CREATE TABLE {label}")
              except sqlite3.Error as e:
                  print(f"  ERR CREATE TABLE {label}: {e}")
                  errors.append(f"{label}: {e}")

          # Verifica tabelle attese
          actual_tables = {
              r[0]
              for r in conn.execute("SELECT name FROM sqlite_master WHERE type='table';")
          }
          missing = EXPECTED_TABLES - actual_tables
          if missing:
              for t in missing:
                  print(f"  ERR TABELLA MANCANTE: {t}")
                  errors.append(f"Missing table: {t}")
          extra = actual_tables - EXPECTED_TABLES
          if extra:
              print(
                  f"\n  INFO Nuove tabelle non ancora in EXPECTED_TABLES: {extra}\n"
                  "       Aggiorna il workflow quando il design e' definitivo."
              )

          # Test CRUD su accounts (tabella radice)
          print("\nCRUD test:")
          try:
              conn.execute(
                  "INSERT INTO accounts (auth_uid, mail, data_di_nascita)"
                  " VALUES ('ci-uid-test', 'ci@test.com', '2000-01-01');"
              )
              row = conn.execute(
                  "SELECT account_id FROM accounts WHERE auth_uid = 'ci-uid-test';"
              ).fetchone()
              assert row, "SELECT non ha restituito la riga inserita"
              conn.execute("DELETE FROM accounts WHERE auth_uid = 'ci-uid-test';")
              print("  OK  accounts: INSERT / SELECT / DELETE")
          except Exception as e:
              print(f"  ERR CRUD su accounts: {e}")
              errors.append(f"CRUD accounts: {e}")

          # Esporta schema per il job di consistency
          schema = {}
          for table in actual_tables:
              rows = conn.execute(f"PRAGMA table_info({table});").fetchall()
              schema[table] = [
                  {
                      "name": r[1],
                      "type": r[2],
                      "notnull": bool(r[3]),
                      "default": r[4],
                      "pk": bool(r[5]),
                  }
                  for r in rows
              ]
          conn.close()

          with open("sqlite-schema.json", "w") as f:
              json.dump(schema, f, indent=2)
          print("\nSchema esportato in sqlite-schema.json")

          if errors:
              print(f"\n{len(errors)} errore/i — CI FALLITO")
              sys.exit(1)
          print("\nTutte le validazioni SQLite superate.")

      - name: Upload SQLite schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-schema
          path: sqlite-schema.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Valida la migration SQL Supabase su PostgreSQL 15
  # Adatta supabase_migration.sql per il testing (mock auth schema, solo STEP 3),
  # esegue la migration, verifica le 7 tabelle, esporta postgres-schema.json.
  # ──────────────────────────────────────────────────────────────────────────
  postgres-validate:
    name: "PostgreSQL — Migration SQL"
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cozy_room_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Adatta migration SQL per test (rimuove parti Supabase-specifiche)
        shell: python
        run: |
          import re, sys

          with open("v1/data/supabase_migration.sql") as f:
              content = f.read()

          # Estrai solo STEP 3 (CREATE TABLE) — salta STEP 1/2 (backup/drop)
          # e STEP 4 (RLS con auth.uid() specifico di Supabase)
          match = re.search(
              r"-- STEP 3:.*?(?=-- STEP 4:)",
              content,
              re.DOTALL | re.IGNORECASE,
          )
          if not match:
              print("ERRORE: STEP 3 non trovato in supabase_migration.sql")
              print("Verifica che il file abbia i commenti '-- STEP 3:' e '-- STEP 4:'")
              sys.exit(1)

          step3_sql = match.group(0)

          # Mock dello schema auth di Supabase (necessario per la FK in accounts)
          preamble = (
              "-- Setup test: mock schema auth di Supabase\n"
              "CREATE SCHEMA IF NOT EXISTS auth;\n"
              "CREATE EXTENSION IF NOT EXISTS pgcrypto;\n"
              "CREATE TABLE IF NOT EXISTS auth.users (\n"
              "    id UUID PRIMARY KEY DEFAULT gen_random_uuid()\n"
              ");\n\n"
          )

          final_sql = preamble + step3_sql

          with open("migration_test.sql", "w") as f:
              f.write(final_sql)

          print("migration_test.sql creato:")
          print("-" * 40)
          print(final_sql)

      - name: Esegui migration adattata su PostgreSQL
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d cozy_room_test -f migration_test.sql

      - name: Valida tabelle ed esporta schema
        shell: python
        run: |
          import psycopg2, json, sys

          # Tabelle attese. Aggiorna insieme a EXPECTED_TABLES in sqlite-validate.
          EXPECTED_TABLES = [
              "accounts", "colore", "categoria", "shop",
              "items", "inventario", "characters",
          ]

          conn = psycopg2.connect(
              host="localhost",
              dbname="cozy_room_test",
              user="postgres",
              password="postgres",
          )
          cur = conn.cursor()

          schema = {}
          errors = []

          for table in EXPECTED_TABLES:
              cur.execute(
                  """
                  SELECT column_name, data_type, is_nullable, column_default
                  FROM information_schema.columns
                  WHERE table_name = %s AND table_schema = 'public'
                  ORDER BY ordinal_position;
                  """,
                  (table,),
              )
              rows = cur.fetchall()
              if not rows:
                  print(f"  ERR TABELLA MANCANTE: {table}")
                  errors.append(f"Missing table: {table}")
              else:
                  schema[table] = [
                      {"name": r[0], "type": r[1], "nullable": r[2], "default": r[3]}
                      for r in rows
                  ]
                  print(f"  OK  {table} ({len(rows)} colonne)")

          conn.close()

          with open("postgres-schema.json", "w") as f:
              json.dump(schema, f, indent=2)
          print("\nSchema esportato in postgres-schema.json")

          if errors:
              print(f"\n{len(errors)} errore/i — CI FALLITO")
              sys.exit(1)
          print("\nTutte le tabelle PostgreSQL validate.")

      - name: Upload PostgreSQL schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-schema
          path: postgres-schema.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Controlla che SQLite e PostgreSQL abbiano le stesse tabelle e colonne
  # continue-on-error: true — emette warning ma NON blocca la pipeline.
  # Utile durante lo sviluppo attivo per rilevare divergenze senza bloccare il team.
  # ──────────────────────────────────────────────────────────────────────────
  schema-consistency:
    name: "Schema — Consistency Check"
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    needs: [sqlite-validate, postgres-validate]
    continue-on-error: true
    steps:
      - name: Download SQLite schema
        uses: actions/download-artifact@v4
        with:
          name: sqlite-schema

      - name: Download PostgreSQL schema
        uses: actions/download-artifact@v4
        with:
          name: postgres-schema

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confronta i due schemi
        shell: python
        run: |
          import json

          with open("sqlite-schema.json") as f:
              sqlite_schema = json.load(f)
          with open("postgres-schema.json") as f:
              pg_schema = json.load(f)

          sqlite_tables = set(sqlite_schema)
          pg_tables = set(pg_schema)

          print("=" * 55)
          print("REPORT CONSISTENZA SCHEMA")
          print("SQLite (local_database.gd)  vs  PostgreSQL (migration SQL)")
          print("=" * 55)

          divergences = []

          # Diff a livello di tabelle
          only_sqlite = sqlite_tables - pg_tables
          only_pg = pg_tables - sqlite_tables
          if only_sqlite:
              print(f"\nWARN Tabelle solo in SQLite (mancano in migration SQL): {only_sqlite}")
              divergences.append(f"Solo in SQLite: {only_sqlite}")
          if only_pg:
              print(f"\nWARN Tabelle solo in PostgreSQL (mancano in GDScript): {only_pg}")
              divergences.append(f"Solo in PostgreSQL: {only_pg}")

          # Diff a livello di colonne per le tabelle comuni
          common = sqlite_tables & pg_tables
          print(f"\nConfronto colonne per {len(common)} tabella/e comune/i:")
          for table in sorted(common):
              sq_cols = {c["name"] for c in sqlite_schema[table]}
              pg_cols = {c["name"] for c in pg_schema[table]}
              only_sq = sq_cols - pg_cols
              only_pg_c = pg_cols - sq_cols
              if only_sq or only_pg_c:
                  print(f"\n  WARN {table}:")
                  if only_sq:
                      print(f"    Solo in SQLite:     {only_sq}")
                  if only_pg_c:
                      print(f"    Solo in PostgreSQL: {only_pg_c}")
                  divergences.append(f"{table}: colonne non allineate")
              else:
                  print(f"  OK   {table} ({len(sq_cols)} colonne allineate)")

          print("\n" + "=" * 55)
          if divergences:
              print(f"WARN {len(divergences)} divergenza/e trovata/e.")
              print("Questo job usa continue-on-error: true — pipeline non bloccata.")
              print("Azione richiesta: allinea local_database.gd e supabase_migration.sql.")
          else:
              print("OK  SQLite e PostgreSQL sono completamente allineati.")
          print("=" * 55)
