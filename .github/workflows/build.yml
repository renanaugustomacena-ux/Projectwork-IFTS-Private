# Pipeline Build — Export Windows and HTML5 builds
#
# Documentazione:
# Eseguita su push al branch main e su tag v*. Produce artifact scaricabili
# per Windows (.exe) e Web (HTML5). Usa il container Docker godot-ci
# per build deterministiche e riproducibili.

name: build
run-name: "Build ${{ github.ref_name }}"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-windows:
    name: "Export Windows"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* \
              ~/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          fi

      - name: Export Windows build
        run: |
          mkdir -p v1/export/windows
          cd v1
          godot --headless --export-release "Windows Desktop" export/windows/RelaxRoom.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: relax-room-windows-${{ github.sha }}
          path: v1/export/windows/
          retention-days: 30

  export-html5:
    name: "Export HTML5"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* \
              ~/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          fi

      - name: Export HTML5 build
        run: |
          mkdir -p v1/export/html5
          cd v1
          godot --headless --export-release "Web" export/html5/index.html

      - name: Upload HTML5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: relax-room-html5-${{ github.sha }}
          path: v1/export/html5/
          retention-days: 30

  export-android:
    name: "Export Android APK"
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* \
              ~/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          fi

      - name: Setup Android debug keystore
        run: |
          # barichello/godot-ci ships with debug.keystore at a known path;
          # ensure Godot editor settings point to it for signing.
          KEYSTORE_PATH="/root/.android/debug.keystore"
          mkdir -p ~/.android
          if [ -f "$KEYSTORE_PATH" ]; then
            cp "$KEYSTORE_PATH" ~/.android/debug.keystore
          else
            # Generate a fresh debug keystore if the container image changed
            keytool -keyalg RSA -genkeypair -alias androiddebugkey \
              -keypass android \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -validity 9999 \
              -deststoretype pkcs12
          fi

      - name: Configure Godot Android editor settings
        run: |
          # Godot export needs editor_settings with Android SDK + Java + keystore.
          mkdir -p ~/.config/godot
          JAVA_BIN=$(readlink -f "$(which java)")
          JAVA_DIR=$(dirname "$(dirname "$JAVA_BIN")")
          echo "Detected Java SDK: $JAVA_DIR"
          cat > ~/.config/godot/editor_settings-4.6.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/java_sdk_path = "$JAVA_DIR"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          cat ~/.config/godot/editor_settings-4.6.tres

      - name: Pre-import resources
        run: |
          cd v1
          godot --headless --import --path . || true
          godot --headless --import --path . || true

      - name: Export Android APK (debug)
        run: |
          mkdir -p v1/export/android
          cd v1
          godot --headless --export-debug "Android" export/android/RelaxRoom.apk
          ls -lh export/android/

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: relax-room-android-${{ github.sha }}
          path: v1/export/android/
          retention-days: 30
