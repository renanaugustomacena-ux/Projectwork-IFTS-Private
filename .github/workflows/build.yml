# Pipeline Build — Export Windows and HTML5 builds
#
# Documentazione:
# Eseguita su push al branch main e su tag v*. Produce artifact scaricabili
# per Windows (.exe) e Web (HTML5). Usa il container Docker godot-ci
# per build deterministiche e riproducibili.

name: build
run-name: "Build ${{ github.ref_name }}"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-windows:
    name: "Export Windows"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* \
              ~/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          fi

      - name: Export Windows build
        run: |
          mkdir -p v1/export/windows
          cd v1
          godot --headless --export-release "Windows Desktop" export/windows/RelaxRoom.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: relax-room-windows-${{ github.sha }}
          path: v1/export/windows/
          retention-days: 30

  export-html5:
    name: "Export HTML5"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* \
              ~/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          fi

      - name: Export HTML5 build
        run: |
          mkdir -p v1/export/html5
          cd v1
          godot --headless --export-release "Web" export/html5/index.html

      - name: Upload HTML5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: relax-room-html5-${{ github.sha }}
          path: v1/export/html5/
          retention-days: 30
