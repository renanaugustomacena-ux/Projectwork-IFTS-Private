# Pipeline CI — Lint GDScript
#
# Documentazione:
# Eseguita su ogni push al branch main e su ogni PR verso main.
# Un solo job: linting e verifica formattazione GDScript.

name: ci
run-name: "${{ github.head_ref || github.ref_name }} — CI"

on:
  pull_request:
    branches: [main]
    paths:
      - "v1/**"
  push:
    branches: [main]
    paths:
      - "v1/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "GDScript Lint & Format"
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit>=4,<5"

      - name: Run gdlint
        run: gdlint v1/scripts/ v1/tests/

      - name: Check formatting
        run: gdformat --check v1/scripts/ v1/tests/
