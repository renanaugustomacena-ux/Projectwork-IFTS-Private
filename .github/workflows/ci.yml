# Pipeline CI — Lint GDScript + Validazione Moduli
#
# Documentazione:
# Eseguita su ogni push al branch main e su ogni PR verso main.
# 5 job paralleli: lint, validazione JSON, sprite, cross-reference, schema DB.

name: ci
run-name: "${{ github.head_ref || github.ref_name }} — CI"

on:
  pull_request:
    branches: [main]
    paths:
      - "v1/**"
      - "ci/**"
  push:
    branches: [main]
    paths:
      - "v1/**"
      - "ci/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "GDScript Lint & Format"
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit>=4,<5"

      - name: Run gdlint
        run: gdlint v1/scripts/ v1/tests/

      - name: Check formatting
        run: gdformat --check v1/scripts/ v1/tests/

  validate-json:
    name: "Validate JSON Catalogs"
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog structure
        run: python ci/validate_json_catalogs.py v1/data

  validate-sprites:
    name: "Validate Sprite Paths"
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check sprite file existence
        run: python ci/validate_sprite_paths.py v1

  validate-crossrefs:
    name: "Validate Cross-References"
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check constants vs catalogs
        run: python ci/validate_cross_references.py v1/scripts/utils/constants.gd v1/data

  validate-db:
    name: "Validate DB Schema"
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate SQL syntax
        run: python ci/validate_db_schema.py v1/scripts/autoload/local_database.gd

  validate-signals:
    name: "Validate SignalBus Count"
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check signal count floor + no duplicates
        run: python ci/validate_signal_count.py v1/scripts/autoload/signal_bus.gd --min 40

  smoke-headless:
    name: "Headless Boot Smoke"
    runs-on: ubuntu-22.04
    timeout-minutes: 6
    container:
      image: barichello/godot-ci:4.6
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Import project resources
        run: |
          godot --headless --import --path v1/ || true

      - name: Run smoke test
        run: |
          cd "$GITHUB_WORKSPACE"
          # Inline instead of calling scripts/smoke_test.sh so the container
          # does not need bash-specific features; parity with the shell script.
          rm -f /tmp/smoke_ci.log
          timeout 12 godot --headless --path v1/ --quit > /tmp/smoke_ci.log 2>&1
          RC=$?
          echo "Godot exit code: $RC"
          PARSE=$(grep -c "Parse Error" /tmp/smoke_ci.log || true)
          SCRIPT=$(grep -c "SCRIPT ERROR" /tmp/smoke_ci.log || true)
          PARSE=${PARSE:-0}
          SCRIPT=${SCRIPT:-0}
          echo "Parse errors: $PARSE"
          echo "Script errors: $SCRIPT"
          tail -20 /tmp/smoke_ci.log
          if [ "$RC" -ne 0 ] || [ "$PARSE" -gt 0 ] || [ "$SCRIPT" -gt 0 ]; then
            echo "FAIL: headless boot regressed"
            exit 1
          fi
          echo "PASS: headless boot"

  deep-tests:
    name: "Deep Integration Tests"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    container:
      image: barichello/godot-ci:4.6
    needs: [smoke-headless]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Import project resources
        run: |
          godot --headless --import --path v1/ || true

      - name: Run deep integration test suite
        run: |
          cd "$GITHUB_WORKSPACE"
          # Invasive suite: 96 tests across 7 modules covering helpers, catalog
          # integrity (every sprite loads), stress hysteresis FSM, save/HMAC +
          # migration, decoration spawn lifecycle for all 72 deco, panel UI
          # lifecycle, simulated WASD input and animation response.
          timeout 90 godot --headless --path v1/ res://tests/test_runner.tscn \
            | tee /tmp/deep_ci.log
          RC=${PIPESTATUS[0]}
          if [ "$RC" -eq 0 ]; then
            echo "PASS: deep tests all green"
          else
            echo "FAIL: deep tests exit $RC"
            exit 1
          fi

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-test-results-${{ github.sha }}
          path: /tmp/deep_ci.log
          retention-days: 14
